# Development Profile - Local Development Configuration
# Usage: java -jar app.jar --spring.profiles.active=dev

# Server Configuration
server.port=8080
server.address=0.0.0.0
server.error.include-message=always
server.error.include-stacktrace=on_param

# Database Configuration - Development
spring.datasource.url=jdbc:mysql://localhost:3306/bmj_db?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Logging Configuration
logging.level.root=INFO
logging.level.com.bookmyjuice=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.file.name=logs/dev/application.log
logging.file.max-size=10MB
logging.file.max-history=10

# Security Configuration
spring.security.user.name=${ADMIN_USER}
spring.security.user.password=${ADMIN_PASSWORD}

# JWT Configuration
bezkoder.app.jwtSecret=${JWT_SECRET}
bezkoder.app.jwtExpirationMs=86400000

# Webhook Configuration
app.webhook.username=${WEBHOOK_USERNAME}
app.webhook.password=${WEBHOOK_PASSWORD}

# Chargebee Configuration
chargebee.site=bookmyjuice-test
chargebee.apiKey=${CHARGEBEE_API_KEY}

# Management Endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# Development Features
spring.h2.console.enabled=false
spring.devtools.restart.enabled=true
debug=false
# Rate Limiting Configuration (Development)
# Same as production: 10 attempts per 5 minutes per IP, 100 global per minute
# Implemented in RateLimiterService and RateLimitingFilter
# For testing, can be disabled by calling RateLimiterService.clearAllLimits()