# Production Profile - Production Deployment Configuration
# Usage: java -jar app.jar --spring.profiles.active=prod

# Server Configuration
server.port=8080
server.address=0.0.0.0
server.error.include-message=never
server.error.include-stacktrace=never
server.shutdown=graceful
server.servlet.session.timeout=30m

# Database Configuration - Production (from environment)
spring.datasource.url=jdbc:mysql://${DB_HOSTNAME:localhost}:${DB_PORT:3306}/${DB_NAME:bmj_db}?allowPublicKeyRetrieval=false&useSSL=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Logging Configuration - Production
logging.level.root=WARN
logging.level.com.bookmyjuice=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=/var/log/bookmyjuice/application.log
logging.file.max-size=100MB
logging.file.max-history=30
logging.file.total-size-cap=10GB

# Security Configuration
spring.security.user.name=${ADMIN_USER}
spring.security.user.password=${ADMIN_PASSWORD}

# JWT Configuration
bezkoder.app.jwtSecret=${JWT_SECRET}
bezkoder.app.jwtExpirationMs=${JWT_EXPIRATION_MS:2592000000}

# Webhook Configuration
app.webhook.username=${WEBHOOK_USERNAME}
app.webhook.password=${WEBHOOK_PASSWORD}

# Chargebee Configuration
chargebee.site=${CHARGEBEE_SITE}
chargebee.apiKey=${CHARGEBEE_API_KEY}

# Management Endpoints - Limited in Production
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.metrics.export.prometheus.enabled=true

# Performance & Security
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.excluded-mime-types=image/png,image/jpeg,image/gif,application/json
spring.mvc.async.request-timeout=60000

# Connection Pool Configuration for Production
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.open-in-view=false

# Production Features
spring.h2.console.enabled=false
spring.devtools.restart.enabled=false
debug=false

# Additional Production Settings
server.error.whitelabel.enabled=false
logging.exception-conversion-word=%wEx
# Rate Limiting Configuration (Production)
# Authentication endpoints: 10 attempts per 5 minutes per IP, 100 global per minute
# Implemented in RateLimiterService and RateLimitingFilter
# Returns 429 Too Many Requests when exceeded