spring.datasource.url=jdbc:mysql://localhost:3306/bmj_db?allowPublicKeyRetrieval=true&useSSL=false
spring.main.allow-bean-definition-overriding=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
server.port=8080

###### Server Config ######
spring.datasource.username=${DB_USERNAME:bmj}
spring.datasource.password=${DB_PASSWORD}
spring.security.user.name=${ADMIN_USER}
spring.security.user.password=${ADMIN_PASSWORD}
server.address=0.0.0.0
chargebee.site=${CHARGEBEE_SITE:bookmyjuice-test}
chargebee.apiKey=${CHARGEBEE_API_KEY}

# Google OAuth Configuration
google.client.id=${GOOGLE_CLIENT_ID:434116959668-sovbab9648vgbk1pi3tfg3ssl60mhb.apps.googleusercontent.com}

# Chargebee Sync Configuration
chargebee.sync.enable-startup-sync=true
chargebee.sync.batch-size=50
chargebee.sync.thread-pool-size=3
chargebee.sync.sync-timeout-minutes=30
bezkoder.app.jwtSecret=${JWT_SECRET}
bezkoder.app.jwtExpirationMs=2592000000

##### Webhook Configuration #####
WEBHOOK_USERNAME=${WEBHOOK_USERNAME}
WEBHOOK_PASSWORD=${WEBHOOK_PASSWORD}

# Enable security debug logging
logging.level.org.springframework.security=DEBUG

##### Email Configuration #####
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:support@bookmyjuice.co.in}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${MAIL_FROM:support@bookmyjuice.co.in}

##### Actuator Management #####
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always