spring.datasource.url=jdbc:mysql://${DB_HOSTNAME:bmj-sql}:3306/${DB_NAME:bmj_db}?allowPublicKeyRetrieval=true&useSSL=false
spring.main.allow-bean-definition-overriding=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
server.port=8080

# Load .env from project root (spring-dotenv)
spring.dotenv.location=../.env

###### Server Config ######
spring.datasource.username=${DB_USERNAME:bmj}
spring.datasource.password=${DB_PASSWORD:PASS@123}
spring.security.user.name=${ADMIN_USER}
spring.security.user.password=${ADMIN_PASSWORD}
server.address=0.0.0.0
chargebee.site=${CHARGEBEE_SITE:bookmyjuice-test}
chargebee.apiKey=${CHARGEBEE_API_KEY}

# Google OAuth Configuration
# Web client ID (used for both ID token verification on Android and Web)
google.client.id=${GOOGLE_CLIENT_ID:24122477606-tju3ortu42psbfluvl9hvmj7q15ec64c.apps.googleusercontent.com}
google.web.client.id=${GOOGLE_WEB_CLIENT_ID:24122477606-tju3ortu42psbfluvl9hvmj7q15ec64c.apps.googleusercontent.com}

# Chargebee Sync Configuration
chargebee.sync.enable-startup-sync=true
chargebee.sync.batch-size=50
chargebee.sync.thread-pool-size=3
chargebee.sync.sync-timeout-minutes=30
bezkoder.app.jwtSecret=${JWT_SECRET}
bezkoder.app.jwtExpirationMs=${JWT_EXPIRATION_MS:2592000000}

##### Webhook Configuration #####
# WEBHOOK_USERNAME and WEBHOOK_PASSWORD are loaded from environment / .env file.
# @Value("${WEBHOOK_USERNAME:}") in WebSecurityConfig provides empty string default.
# Do NOT define these as properties here — it creates circular placeholder references.

# Enable security debug logging
logging.level.org.springframework.security=DEBUG

##### Email Configuration #####
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:support@bookmyjuice.co.in}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${MAIL_FROM:support@bookmyjuice.co.in}

##### Actuator Management #####
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
