# Sentry Configuration for BookMyJuice Backend
# DSN is loaded from environment variable SENTRY_DSN_BACKEND
# Fallback: empty string (Sentry disabled if no DSN configured)
dsn=${SENTRY_DSN_BACKEND:}

# Environment tag
environment=${SPRING_PROFILES_ACTIVE:development}

# Release version (set during CI/CD build)
# release=bookmyjuice-backend@1.0.0

# Sample rate for error capture (1.0 = 100% in dev, lower in prod)
sample-rate=1.0

# Send stack traces with code context
attach-stacktrace=true

# Performance tracing sample rate (0.0 = disabled for now)
traces-sample-rate=0.1

# Maximum number of breadcrumbs to track
max-breadcrumbs=100

# Send PII (user info) with events - enabled for debugging user-specific issues
send-default-pii=true

# Enable debug logging for Sentry SDK (set to false in production)
debug=${SENTRY_DEBUG:false}
