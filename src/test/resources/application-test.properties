# Test Profile Configuration
# Used for CI/CD pipelines (GitHub Actions)

# Marker to prove this file is loaded
bmj.test.profile=active

# Database Configuration
# Matches the GitHub Actions MySQL service container
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/bmj_db?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=bmj
spring.datasource.password=bmjpass

# JPA/Hibernate Configuration for Testing
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Chargebee Configuration (Dummy values for tests)
chargebee.site=test-site
chargebee.apiKey=test_api_key_for_ci

# Security (Dummy values)
bezkoder.app.jwtSecret=test_jwt_secret_for_ci_must_be_32_chars_long
webhook.username=webhook_user
webhook.password=webhook_pass

# Disable email sending in tests
spring.mail.host=localhost
spring.mail.port=3025
