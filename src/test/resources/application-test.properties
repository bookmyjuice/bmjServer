# ============================================================
# Test profile for local development integration tests
# ============================================================
# Uses MySQL database bmj_db for testing (same as production)
# ============================================================

# MySQL database for test isolation
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/bmj_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=bmj
spring.datasource.password=PASS@123

# Hibernate with MySQL dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# Enable Flyway for tests to set up schema
spring.flyway.enabled=true

# Disable Chargebee sync on startup for tests
chargebee.sync.enable-startup-sync=false

# Test profile marker (checked by TestProfileIntegrationTest)
bmj.test.profile=active

# JWT configuration for tests
bezkoder.app.jwtSecret=TestJWTSecretKeyForIntegrationTestsOnly1234567890
bezkoder.app.jwtExpirationMs=86400000

# Webhook credentials for tests
WEBHOOK_USERNAME=test_webhook_user
WEBHOOK_PASSWORD=test_webhook_pass

# Reduce log noise in tests
logging.level.org.springframework=WARN
logging.level.com.bookmyjuice=WARN
